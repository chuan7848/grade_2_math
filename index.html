<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>數學大冒險 🌟</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700;900&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{height:100%;overflow:hidden;touch-action:none;background:#111}

    #app{
      font-family:'Nunito',sans-serif;
      background:#1e1b4b;
      position:fixed;inset:0;
      overflow:hidden;
      display:flex;flex-direction:column;
    }
    .bg-deco{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0}
    .bbl{position:absolute;border-radius:50%;opacity:.07}
    #view{
      position:relative;z-index:2;
      flex:1;overflow-y:auto;overflow-x:hidden;
      padding:max(12px,env(safe-area-inset-top)) 16px max(12px,env(safe-area-inset-bottom));
      display:flex;flex-direction:column;align-items:center;
      -webkit-overflow-scrolling:touch;
      overscroll-behavior:contain;
    }

    .hud{width:100%;max-width:520px;display:flex;justify-content:space-between;align-items:center;gap:5px;margin-bottom:10px;flex-wrap:wrap}
    .chip{background:rgba(255,255,255,.12);border-radius:40px;padding:5px 11px;color:#fff;font-size:clamp(11px,2.5vw,13px);font-weight:700;display:flex;align-items:center;gap:4px;white-space:nowrap}
    .chip .val{color:#fde68a;font-size:clamp(14px,3.5vw,18px)}
    .chip.tc .val{color:#86efac}

    .prog-wrap{width:100%;max-width:520px;margin-bottom:6px}
    .prog-track{height:7px;background:rgba(255,255,255,.15);border-radius:8px;overflow:hidden}
    .prog-fill{height:100%;border-radius:8px;background:#a78bfa;transition:width .5s}
    .prog-label{font-size:11px;color:rgba(255,255,255,.45);font-weight:700;margin-top:3px;text-align:right}

    .mascot-wrap{display:flex;flex-direction:column;align-items:center;margin:4px 0 8px}
    .mascot-face{font-size:clamp(38px,9vw,52px);animation:bobble 2.8s ease-in-out infinite;line-height:1}
    @keyframes bobble{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-5px) rotate(2deg)}}
    .bubble-speech{background:#fff;border-radius:13px;padding:6px 14px;color:#1e1b4b;font-size:clamp(12px,3vw,14px);font-weight:700;margin-top:7px;max-width:min(260px,80vw);text-align:center;position:relative}
    .bubble-speech::after{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#fff}

    .qcard{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:18px;padding:clamp(14px,4vw,22px) clamp(16px,5vw,28px);width:100%;max-width:520px;text-align:center}
    .mode-tag{font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#a78bfa;margin-bottom:4px}
    .question-text{font-size:clamp(28px,8vw,40px);font-weight:900;color:#fff;line-height:1.3;white-space:pre-line}
    .timer-track{height:5px;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden;margin-top:10px}
    .timer-bar{height:100%;border-radius:6px;transition:width .12s linear,background .5s}

    .ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:clamp(7px,2vw,11px);width:100%;max-width:520px;margin-top:12px}
    .ans-btn{
      background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);
      border-radius:13px;padding:clamp(10px,3vw,15px) 8px;
      font-size:clamp(20px,5.5vw,26px);font-weight:900;color:#fff;
      cursor:pointer;transition:transform .12s,background .12s;
      font-family:'Nunito',sans-serif;text-align:center;
      touch-action:manipulation;
    }
    .ans-btn:active{background:rgba(255,255,255,.25);transform:scale(1.04)}
    .ans-btn.correct{background:rgba(52,211,153,.4);border-color:#34d399;animation:pop .3s}
    .ans-btn.wrong{background:rgba(248,113,113,.4);border-color:#f87171;animation:jolt .3s}
    @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.13)}100%{transform:scale(1)}}
    @keyframes jolt{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}

    .reward-pop{position:fixed;top:35%;left:50%;transform:translateX(-50%) scale(0);background:#fde68a;color:#1e1b4b;border-radius:13px;padding:7px 20px;font-size:clamp(16px,4.5vw,22px);font-weight:900;font-family:'Nunito',sans-serif;z-index:60;pointer-events:none}
    .reward-pop.fly{animation:flyup .85s ease forwards}
    @keyframes flyup{0%{transform:translateX(-50%) scale(0);opacity:1}40%{transform:translateX(-50%) scale(1.1) translateY(-10px);opacity:1}100%{transform:translateX(-50%) scale(.9) translateY(-55px);opacity:0}}

    .fw-canvas{position:fixed;inset:0;pointer-events:none;z-index:50}

    .center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;gap:clamp(9px,2.5vw,14px);text-align:center;width:100%;padding:8px 0}
    .game-title{font-size:clamp(24px,7vw,34px);font-weight:900;color:#fde68a;line-height:1.2}
    .sub-title{font-size:clamp(12px,3.5vw,15px);color:rgba(255,255,255,.75);font-weight:700}
    .mode-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:2px 0}
    .mcard{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:13px;padding:clamp(8px,2.5vw,12px) clamp(12px,3.5vw,18px);text-align:center;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif;transition:all .15s;min-width:clamp(76px,18vw,96px);touch-action:manipulation}
    .mcard:active{background:rgba(255,255,255,.22);transform:scale(1.04)}
    .mcard.picked{border-color:#a78bfa;background:rgba(167,139,250,.2)}
    .mcard-icon{font-size:clamp(20px,5.5vw,26px);margin-bottom:3px}
    .mcard-name{font-size:clamp(11px,2.8vw,13px);font-weight:800}
    .big-btn{background:#a78bfa;border:none;border-radius:13px;padding:clamp(10px,2.8vw,13px) clamp(22px,6vw,34px);font-size:clamp(15px,4vw,18px);font-weight:900;color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;transition:transform .12s;touch-action:manipulation}
    .big-btn:active{transform:scale(1.05)}
    .big-btn.ghost{background:rgba(255,255,255,.15)}
    .nick-input{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);border-radius:12px;padding:9px 15px;font-size:clamp(14px,4vw,16px);font-weight:700;color:#fff;font-family:'Nunito',sans-serif;text-align:center;width:min(220px,70vw);outline:none;-webkit-appearance:none}
    .nick-input::placeholder{color:rgba(255,255,255,.4)}

    .lb-scroll{width:100%;max-width:520px}
    .lb-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
    .lb-col-hd{display:flex;gap:5px;font-size:10px;font-weight:700;color:rgba(255,255,255,.38);padding:0 12px;margin-bottom:7px}
    .lb-row{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.08);border-radius:12px;padding:8px 12px;margin-bottom:7px;color:#fff;font-size:clamp(11px,2.8vw,13px);font-weight:700}
    .lb-rank{width:26px;text-align:center;font-size:clamp(13px,3.5vw,16px);font-weight:900;flex-shrink:0}
    .lb-name{flex:1;font-size:clamp(12px,3vw,14px);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .lb-score{color:#fde68a;font-size:clamp(13px,3.5vw,15px);font-weight:900;min-width:44px;text-align:right;flex-shrink:0}
    .lb-time{color:#86efac;font-size:clamp(10px,2.5vw,12px);min-width:42px;text-align:right;flex-shrink:0}
    .lb-mode{color:#c4b5fd;font-size:10px;min-width:34px;text-align:right;flex-shrink:0}
    .lb-date{color:rgba(255,255,255,.4);font-size:10px;min-width:80px;text-align:right;flex-shrink:0}

    .stars-row{display:flex;gap:7px;justify-content:center;margin:4px 0}
    .s-icon{font-size:clamp(20px,5.5vw,26px);filter:grayscale(1) brightness(.5)}
    .s-icon.lit{filter:none}
    .result-score{color:#fde68a;font-size:clamp(34px,9vw,44px);font-weight:900}
    .result-msg{color:rgba(255,255,255,.85);font-size:clamp(13px,3.5vw,16px);font-weight:700}
    .stat-row{display:flex;gap:9px;justify-content:center;flex-wrap:wrap}
    .stat-chip{background:rgba(255,255,255,.12);border-radius:11px;padding:8px 14px;color:#fff;font-size:clamp(11px,2.8vw,12px);font-weight:700;text-align:center}
    .stat-chip .n{font-size:clamp(16px,4.5vw,20px);color:#fde68a;display:block}
    .info-row{display:flex;gap:8px;color:rgba(255,255,255,.45);font-size:clamp(10px,2.5vw,12px);font-weight:700;flex-wrap:wrap;justify-content:center}
  </style>
</head>
<body>
  <div id="app">
    <div class="bg-deco" id="bgDeco"></div>
    <canvas class="fw-canvas" id="fwCv"></canvas>
    <div id="view"></div>
    <div class="reward-pop" id="rPop"></div>
  </div>

  <script>
    /* ── 防止畫面滾動 ── */
    document.addEventListener('touchmove', e => {
      if (!e.target.closest('#view')) e.preventDefault();
    }, {passive: false});
    document.addEventListener('touchstart', e => {
      if (!e.target.closest('#view') && !e.target.closest('.ans-btn') &&
          !e.target.closest('.mcard') && !e.target.closest('.big-btn') &&
          !e.target.closest('.nick-input')) {
        e.preventDefault();
      }
    }, {passive: false});

    const S={
      page:'home',mode:'mix',score:0,streak:0,lives:3,
      qi:0,total:10,locked:false,
      timerMs:9000,timerLeft:0,timerTick:null,
      face:'🐰',speech:'',
      gameMs:0,gameTick:null,
      nickname:''
    };
    const ML={add:'加法',sub:'減法',mul:'乘法',cmp:'比大小',mix:'混合'};
    const LS='mathgame_lb_v3';
    let CQ=null, actx=null;

    /* ── Audio ── */
    function getCtx(){
      if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
      if(actx.state==='suspended') actx.resume();
      return actx;
    }
    function playOk(){
      try{
        const c=getCtx(), now=c.currentTime;
        [[523,.08],[659,.08],[784,.08],[1047,.25]].forEach(([f,t],i)=>{
          const o=c.createOscillator(), g=c.createGain();
          o.connect(g); g.connect(c.destination); o.type='sine'; o.frequency.value=f;
          const s=now+i*.1;
          g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(.28,s+.02);
          g.gain.exponentialRampToValueAtTime(.001,s+t+.1);
          o.start(s); o.stop(s+t+.12);
        });
      }catch(e){}
    }
    function playBad(){
      try{
        const c=getCtx(), now=c.currentTime;
        [180,160,140].forEach((f,i)=>{
          const o=c.createOscillator(), g=c.createGain();
          o.connect(g); g.connect(c.destination); o.type='sawtooth'; o.frequency.value=f;
          const s=now+i*.07;
          g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(.25,s+.01);
          g.gain.exponentialRampToValueAtTime(.001,s+.15);
          o.start(s); o.stop(s+.17);
        });
      }catch(e){}
    }

    /* ── Fireworks ── */
    const FW={parts:[]};
    function launch(){
      const cv=document.getElementById('fwCv');
      cv.width=window.innerWidth; cv.height=window.innerHeight;
      const cx=cv.getContext('2d');
      const cols=['#fde68a','#a78bfa','#34d399','#f87171','#60a5fa','#fb923c'];
      for(let b=0;b<3;b++){
        const x=cv.width*(.2+Math.random()*.6), y=cv.height*(.1+Math.random()*.35);
        for(let i=0;i<28;i++){
          const a=Math.random()*Math.PI*2, sp=2+Math.random()*4;
          FW.parts.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,
            col:cols[~~(Math.random()*cols.length)],sz:2+Math.random()*2});
        }
      }
      if(!FW.raf) fwLoop(cx,cv);
    }
    function fwLoop(cx,cv){
      cx.clearRect(0,0,cv.width,cv.height);
      FW.parts=FW.parts.filter(p=>{
        p.x+=p.vx; p.y+=p.vy; p.vy+=.09; p.life-=.022;
        if(p.life<=0) return false;
        cx.globalAlpha=p.life; cx.fillStyle=p.col;
        cx.beginPath(); cx.arc(p.x,p.y,p.sz,0,Math.PI*2); cx.fill();
        return true;
      });
      cx.globalAlpha=1;
      FW.raf=FW.parts.length?requestAnimationFrame(()=>fwLoop(cx,cv)):null;
      if(!FW.raf) cx.clearRect(0,0,cv.width,cv.height);
    }

    /* ── BG Bubbles ── */
    function mkBg(){
      const d=document.getElementById('bgDeco');
      ['#6d28d9','#7c3aed','#4f46e5','#0d9488','#1e40af','#7e22ce'].forEach(c=>{
        const b=document.createElement('div'); b.className='bbl';
        const sz=60+Math.random()*200;
        b.style.cssText=`width:${sz}px;height:${sz}px;background:${c};top:${Math.random()*100}%;left:${Math.random()*100}%;transform:translate(-50%,-50%)`;
        d.appendChild(b);
      });
    }

    /* ── Helpers ── */
    function pop(msg){
      const el=document.getElementById('rPop');
      el.textContent=msg; el.className='reward-pop fly';
      el.addEventListener('animationend',()=>el.className='reward-pop',{once:true});
    }
    function fmtT(ms){const s=Math.floor(ms/1000),m=Math.floor(s/60);return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`}
    function fmtDT(ts){
      const d=new Date(ts);
      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }

    /* ── Leaderboard ── */
    function saveLB(e){
      let lb=[];try{lb=JSON.parse(localStorage.getItem(LS)||'[]')}catch(_){}
      lb.push(e); lb.sort((a,b)=>b.score-a.score||a.gameMs-b.gameMs);
      localStorage.setItem(LS,JSON.stringify(lb.slice(0,20)));
    }
    function getLB(){try{return JSON.parse(localStorage.getItem(LS)||'[]')}catch(_){return[]}}
    function clearLB(){localStorage.removeItem(LS)}

    /* ── Question Generator ── */
    function genQ(){
      const types=S.mode==='mix'?['add','sub','mul','cmp']:[S.mode];
      const t=types[~~(Math.random()*types.length)];
      let q,ans,choices;
      if(t==='add'){
        const a=~~(Math.random()*50)+1; let b=~~(Math.random()*50)+1;
        if(a+b>99) b=~~(Math.random()*30)+1;
        ans=String(a+b); q=`${a} + ${b} = ?`;
      } else if(t==='sub'){
        const a=~~(Math.random()*70)+20, b=~~(Math.random()*(a-1))+1;
        ans=String(a-b); q=`${a} − ${b} = ?`;
      } else if(t==='mul'){
        const a=~~(Math.random()*5)+2, b=~~(Math.random()*9)+1;
        ans=String(a*b); q=`${a} × ${b} = ?`;
      } else {
        const a=~~(Math.random()*98)+1; let b=~~(Math.random()*98)+1;
        while(b===a) b=~~(Math.random()*98)+1;
        ans=String(a>b?a:b);
        const ws=[...new Set([String(a),String(b),String(a+b),String(Math.abs(a-b))])]
          .sort(()=>Math.random()-.5).slice(0,4);
        while(ws.length<4) ws.push(String(~~(Math.random()*99)+1));
        return{t,q:`${a}　和　${b}\n哪個比較大？`,ans,choices:ws};
      }
      const ws=new Set();
      while(ws.size<3){const w=Number(ans)+~~(Math.random()*12)-6;if(String(w)!==ans&&w>=0)ws.add(String(w))}
      choices=[ans,...ws].sort(()=>Math.random()-.5);
      return{t,q,ans,choices};
    }

    /* ── Render Router ── */
    function render(){
      document.getElementById('view').scrollTop=0;
      ({home:renderHome,game:renderGame,result:renderResult,lb:renderLB}[S.page]||renderHome)();
    }

    /* ── HOME ── */
    function renderHome(){
      document.getElementById('view').innerHTML=`
      <div class="center-screen">
        <div style="font-size:clamp(50px,14vw,64px);animation:bobble 2.8s ease-in-out infinite">🐰</div>
        <div class="game-title">🌟 數學大冒險 🌟</div>
        <div class="sub-title">和小兔一起闖關，收集星星！</div>
        <div style="display:flex;align-items:center;gap:9px">
          <span style="color:rgba(255,255,255,.6);font-size:clamp(12px,3vw,13px);font-weight:700">暱稱：</span>
          <input class="nick-input" id="nickInp" placeholder="輸入你的名字" maxlength="8" value="${S.nickname}">
        </div>
        <div style="color:rgba(255,255,255,.55);font-size:clamp(10px,2.5vw,12px);font-weight:700">選擇模式</div>
        <div class="mode-row">
          ${['add','sub','mul','cmp','mix'].map(m=>`
          <div class="mcard${S.mode===m?' picked':''}" onclick="S.mode='${m}';renderHome()">
            <div class="mcard-icon">${{add:'➕',sub:'➖',mul:'✖️',cmp:'⚖️',mix:'🎲'}[m]}</div>
            <div class="mcard-name">${ML[m]}</div>
          </div>`).join('')}
        </div>
        <div class="info-row"><span>❤️ 3 命</span><span>⭐ 10 題</span><span>⏱ 9 秒/題</span><span>🕐 全程計時</span></div>
        <div style="display:flex;gap:9px;flex-wrap:wrap;justify-content:center">
          <button class="big-btn" onclick="startGame()">🚀 開始冒險！</button>
          <button class="big-btn ghost" onclick="S.page='lb';render()">🏆 排行榜</button>
        </div>
      </div>`;
      const n=document.getElementById('nickInp');
      if(n) n.addEventListener('input',e=>S.nickname=e.target.value.trim());
    }

    /* ── GAME ── */
    function startGame(){
      if(!S.nickname){alert('請先輸入你的暱稱喔！');return;}
      Object.assign(S,{score:0,streak:0,lives:3,qi:0,locked:false,gameMs:0});
      S.page='game'; S.face='🐰'; S.speech='加油！';
      if(S.gameTick) clearInterval(S.gameTick);
      S.gameTick=setInterval(()=>{
        S.gameMs+=100;
        const el=document.getElementById('gTimer');
        if(el) el.textContent=fmtT(S.gameMs);
      },100);
      nextQ();
    }

    function nextQ(){
      if(S.qi>=S.total){endGame();return;}
      CQ=genQ(); S.locked=false;
      renderGame(); startQTimer();
    }

    function startQTimer(){
      if(S.timerTick) clearInterval(S.timerTick);
      S.timerLeft=S.timerMs;
      S.timerTick=setInterval(()=>{
        S.timerLeft-=80;
        const pct=Math.max(0,S.timerLeft/S.timerMs*100);
        const bar=document.getElementById('tBar');
        if(bar){
          bar.style.width=pct+'%';
          bar.style.background=pct>55?'#a78bfa':pct>28?'#fbbf24':'#f87171';
        }
        if(S.timerLeft<=0){clearInterval(S.timerTick);onTimeout();}
      },80);
    }

    function onTimeout(){
      if(S.locked) return; S.locked=true;
      S.streak=0; S.lives--;
      S.face='😢'; S.speech='時間到！沒關係～';
      playBad(); hiliteOk(); updateHUD();
      if(S.lives<=0) setTimeout(endGame,1300);
      else setTimeout(()=>{S.qi++;nextQ();},1300);
    }

    function doAnswer(btn,val){
      if(S.locked) return; S.locked=true;
      if(S.timerTick) clearInterval(S.timerTick);
      const ok=val===CQ.ans;
      btn.classList.add(ok?'correct':'wrong');
      document.querySelectorAll('.ans-btn').forEach(b=>b.disabled=true);
      if(ok){
        const bonus=S.streak>=2?S.streak*2:0;
        S.score+=10+bonus; S.streak++;
        S.face='🥳'; S.speech=S.streak>=3?`🔥 ${S.streak}連擊！`:'答對了！真棒！';
        playOk(); launch();
        pop(S.streak>=3?`🔥 ${S.streak}連擊 +${10+bonus}分`:'✅ +10分');
      } else {
        S.streak=0; S.lives--;
        S.face='😢'; S.speech='答錯了，下次加油！';
        playBad(); hiliteOk();
      }
      updateHUD();
      if(S.lives<=0) setTimeout(endGame,1300);
      else setTimeout(()=>{S.qi++;nextQ();},1200);
    }

    function hiliteOk(){
      document.querySelectorAll('.ans-btn').forEach(b=>{
        if(b.dataset.val===CQ.ans) b.classList.add('correct');
        b.disabled=true;
      });
    }

    function updateHUD(){
      const m={hudL:'lives',hudS:'score',hudStr:'streak'};
      for(const [id,k] of Object.entries(m)){const e=document.getElementById(id);if(e)e.textContent=S[k]}
      const sp=document.getElementById('speech');if(sp)sp.textContent=S.speech;
      const mc=document.getElementById('mFace');if(mc)mc.textContent=S.face;
      const pf=document.getElementById('pFill');if(pf)pf.style.width=Math.round(S.qi/S.total*100)+'%';
    }

    function renderGame(){
      const pct=Math.round(S.qi/S.total*100);
      document.getElementById('view').innerHTML=`
      <div class="hud">
        <div class="chip">❤️ <span class="val" id="hudL">${S.lives}</span></div>
        <div class="chip">⭐ <span class="val" id="hudS">${S.score}</span></div>
        <div class="chip tc">🕐 <span class="val" id="gTimer">${fmtT(S.gameMs)}</span></div>
        <div class="chip">🔥 <span class="val" id="hudStr">${S.streak}</span></div>
      </div>
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="pFill" style="width:${pct}%"></div></div>
        <div class="prog-label">第 ${S.qi+1} / ${S.total} 題</div>
      </div>
      <div class="mascot-wrap">
        <div class="mascot-face" id="mFace">${S.face}</div>
        <div class="bubble-speech" id="speech">${S.speech}</div>
      </div>
      <div class="qcard">
        <div class="mode-tag">${ML[CQ.t]||''}</div>
        <div class="question-text">${CQ.q}</div>
        <div class="timer-track"><div class="timer-bar" id="tBar" style="width:100%;background:#a78bfa"></div></div>
      </div>
      <div class="ans-grid">
        ${CQ.choices.map(c=>`<button class="ans-btn" data-val="${c}" onclick="doAnswer(this,'${c}')">${c}</button>`).join('')}
      </div>`;
    }

    function endGame(){
      if(S.timerTick) clearInterval(S.timerTick);
      if(S.gameTick) clearInterval(S.gameTick);
      saveLB({name:S.nickname,score:S.score,gameMs:S.gameMs,mode:S.mode,ts:Date.now()});
      S.page='result'; render();
    }

    /* ── RESULT ── */
    function renderResult(){
      const pct=Math.round(S.score/(S.total*10)*100);
      const emo=S.lives<=0?'💔':pct>=80?'🏆':pct>=60?'🌟':'🐰';
      const msg=S.lives<=0?'再試一次，你一定可以！':pct>=80?'太厲害了！數學小天才！':pct>=60?'做得很好！繼續加油！':'多練習，你會越來越棒！';
      const stars=pct>=80?3:pct>=60?2:1;
      document.getElementById('view').innerHTML=`
      <div class="center-screen">
        <div style="font-size:clamp(54px,15vw,68px);animation:bobble 2.8s ease-in-out infinite">${emo}</div>
        <div class="stars-row">${[0,1,2].map(i=>`<span class="s-icon${i<stars?' lit':''}">⭐</span>`).join('')}</div>
        <div class="result-score">${S.score} 分</div>
        <div class="result-msg">${msg}</div>
        <div class="stat-row">
          <div class="stat-chip"><span class="n">${Math.round(S.score/10)}</span>答對</div>
          <div class="stat-chip"><span class="n">${fmtT(S.gameMs)}</span>用時</div>
          <div class="stat-chip"><span class="n">${S.lives>0?S.lives:0}</span>剩餘命</div>
        </div>
        <div style="display:flex;gap:9px;flex-wrap:wrap;justify-content:center">
          <button class="big-btn" onclick="startGame()">🔄 再玩一次</button>
          <button class="big-btn ghost" onclick="S.page='lb';render()">🏆 排行榜</button>
          <button class="big-btn ghost" onclick="S.page='home';render()">🏠 主選單</button>
        </div>
      </div>`;
    }

    /* ── LEADERBOARD ── */
    function renderLB(){
      const lb=getLB();
      const ri=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
      document.getElementById('view').innerHTML=`
      <div class="lb-scroll">
        <div class="lb-header">
          <div style="color:#fde68a;font-size:clamp(16px,5vw,20px);font-weight:900">🏆 排行榜</div>
          <div style="display:flex;gap:7px">
            <button class="big-btn ghost" style="font-size:11px;padding:6px 12px"
              onclick="if(confirm('確定清除所有紀錄？')){clearLB();renderLB()}">清除</button>
            <button class="big-btn ghost" style="font-size:11px;padding:6px 12px"
              onclick="S.page='home';render()">← 返回</button>
          </div>
        </div>
        <div class="lb-col-hd">
          <span style="width:26px"></span>
          <span style="flex:1">暱稱</span>
          <span style="min-width:44px;text-align:right">分數</span>
          <span style="min-width:42px;text-align:right">用時</span>
          <span style="min-width:34px;text-align:right">模式</span>
          <span style="min-width:80px;text-align:right">日期時間</span>
        </div>
        ${lb.length===0
          ?`<div style="color:rgba(255,255,255,.4);text-align:center;padding:36px 0;font-size:14px">還沒有紀錄，快去闖關！</div>`
          :lb.map((e,i)=>`
          <div class="lb-row">
            <div class="lb-rank">${ri(i)}</div>
            <div class="lb-name">${e.name||'無名'}</div>
            <div class="lb-score">${e.score}分</div>
            <div class="lb-time">${fmtT(e.gameMs)}</div>
            <div class="lb-mode">${ML[e.mode]||e.mode}</div>
            <div class="lb-date">${fmtDT(e.ts)}</div>
          </div>`).join('')}
        <div style="color:rgba(255,255,255,.3);font-size:10px;text-align:center;margin-top:10px;padding-bottom:8px;font-weight:700">
          排序：分數高 → 用時短
        </div>
      </div>`;
    }

    /* ── Init ── */
    mkBg();
    render();
  </script>
</body>
</html>
