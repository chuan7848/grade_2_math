
<style>

  .bubble-speech{background:#fff;border-radius:13px;padding:7px 15px;color:#1e1b4b;font-size:13px;font-weight:700;margin-top:7px;max-width:260px;text-align:center;position:relative}
  .bubble-speech::after{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#fff}

  .qcard{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:18px;padding:18px 24px;width:100%;max-width:500px;text-align:center}
  .mode-tag{font-size:10px;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:#a78bfa;margin-bottom:4px}
  .question-text{font-size:36px;font-weight:900;color:#fff;line-height:1.3;white-space:pre-line}
  .timer-track{height:5px;background:rgba(255,255,255,.15);border-radius:6px;overflow:hidden;margin-top:10px}
  .timer-bar{height:100%;border-radius:6px;transition:width .12s linear,background .5s}

  .ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;width:100%;max-width:500px;margin-top:12px}
  .ans-btn{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.25);border-radius:13px;padding:13px 8px;font-size:24px;font-weight:900;color:#fff;cursor:pointer;transition:transform .12s,background .12s;font-family:'Nunito',sans-serif;text-align:center}
  .ans-btn:hover:not(:disabled){background:rgba(255,255,255,.25);transform:scale(1.04)}
  .ans-btn.correct{background:rgba(52,211,153,.4);border-color:#34d399;animation:pop .3s}
  .ans-btn.wrong{background:rgba(248,113,113,.4);border-color:#f87171;animation:jolt .3s}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.13)}100%{transform:scale(1)}}
  @keyframes jolt{0%,100%{transform:translateX(0)}30%{transform:translateX(-6px)}70%{transform:translateX(6px)}}

  .reward-pop{position:absolute;top:36%;left:50%;transform:translateX(-50%) scale(0);background:#fde68a;color:#1e1b4b;border-radius:13px;padding:7px 20px;font-size:20px;font-weight:900;font-family:'Nunito',sans-serif;z-index:50;pointer-events:none}
  .reward-pop.fly{animation:flyup .85s ease forwards}
  @keyframes flyup{0%{transform:translateX(-50%) scale(0);opacity:1}40%{transform:translateX(-50%) scale(1.1) translateY(-8px);opacity:1}100%{transform:translateX(-50%) scale(.9) translateY(-55px);opacity:0}}

  .firework-canvas{position:absolute;inset:0;pointer-events:none;z-index:40}

  .center-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:580px;gap:12px;text-align:center;width:100%}
  .game-title{font-size:32px;font-weight:900;color:#fde68a;line-height:1.2}
  .sub-title{font-size:14px;color:rgba(255,255,255,.75);font-weight:700}
  .mode-row{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin:4px 0}
  .mcard{background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.2);border-radius:13px;padding:10px 16px;text-align:center;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif;transition:all .15s;min-width:90px}
  .mcard:hover{background:rgba(255,255,255,.22);transform:scale(1.04)}

  .mcard-name{font-size:12px;font-weight:800}

  .big-btn:hover{transform:scale(1.05)}
  .big-btn.ghost{background:rgba(255,255,255,.15)}
  .nick-input{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);border-radius:12px;padding:10px 16px;font-size:16px;font-weight:700;color:#fff;font-family:'Nunito',sans-serif;text-align:center;width:220px;outline:none}
  .nick-input::placeholder{color:rgba(255,255,255,.4)}

  .lb-wrap{width:100%;max-width:500px;margin-top:4px}
  .lb-row{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.08);border-radius:12px;padding:9px 14px;margin-bottom:7px;color:#fff;font-size:13px;font-weight:700}
  .lb-rank{width:28px;text-align:center;font-size:16px;font-weight:900}
  .lb-name{flex:1;font-size:14px}
  .lb-score{color:#fde68a;font-size:16px;font-weight:900;min-width:52px;text-align:right}
  .lb-time{color:#86efac;font-size:12px;min-width:52px;text-align:right}
  .lb-date{color:rgba(255,255,255,.4);font-size:11px;min-width:100px;text-align:right}
  .lb-mode{color:#c4b5fd;font-size:11px;min-width:44px;text-align:right}
  .s-icon{font-size:24px;filter:grayscale(1) brightness(.5);transition:filter .4s}
  .s-icon.lit{filter:none}
  .stars-row{display:flex;gap:7px;justify-content:center;margin:6px 0 3px}
  .result-score{color:#fde68a;font-size:42px;font-weight:900}
  .result-msg{color:rgba(255,255,255,.85);font-size:15px;font-weight:700}
  .stat-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .stat-chip{background:rgba(255,255,255,.12);border-radius:11px;padding:9px 16px;color:#fff;font-size:12px;font-weight:700;text-align:center}
  .stat-chip .n{font-size:20px;color:#fde68a;display:block}
  .tab-row{display:flex;gap:8px;margin-bottom:12px}
  .tab{background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:7px 18px;color:rgba(255,255,255,.6);font-size:13px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;transition:all .15s}
  .tab.on{background:rgba(167,139,250,.3);border-color:#a78bfa;color:#fff}
</style>

<h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden">小學二年級數學大冒險遊戲，包含排行榜功能</h2>
<div id="app">
  <div class="bg-deco" id="bgDeco"></div>
  <canvas class="firework-canvas" id="fwCanvas"></canvas>
  <div id="view"></div>
  <div class="reward-pop" id="rewardPop"></div>
</div>

<script>
const S={
  page:'home',mode:'mix',score:0,streak:0,lives:3,
  qi:0,total:10,locked:false,answer:null,
  timerMs:9000,timerLeft:0,timerTick:null,
  face:'🐰',speech:'',
  gameMs:0,gameTick:null,
  nickname:'',tab:'game'
};
const MODELABEL={add:'加法',sub:'減法',mul:'乘法',cmp:'比大小',mix:'混合'};
const LS_KEY='mathgame_lb_v2';
let CQ=null, actx=null;

function getCtx(){
  if(!actx) actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended') actx.resume();
  return actx;
}

function playCorrect(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [[523,.08],[659,.08],[784,.08],[1047,.25]].forEach(([f,t],i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=f; o.type='sine';
      const s=now+i*0.1;
      g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(.28,s+.02);
      g.gain.exponentialRampToValueAtTime(.001,s+t+.1);
      o.start(s); o.stop(s+t+.12);
    });
  }catch(e){}
}

function playWrong(){
  try{
    const ctx=getCtx(), now=ctx.currentTime;
    [180,160,140].forEach((f,i)=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type='sawtooth'; o.frequency.value=f;
      const s=now+i*0.07;
      g.gain.setValueAtTime(0,s); g.gain.linearRampToValueAtTime(.25,s+.01);
      g.gain.exponentialRampToValueAtTime(.001,s+.15);
      o.start(s); o.stop(s+.17);
    });
    const n=ctx.createOscillator(), ng=ctx.createGain();
    n.connect(ng); ng.connect(ctx.destination);
    n.type='sawtooth'; n.frequency.value=80;
    ng.gain.setValueAtTime(.2,now+.1); ng.gain.exponentialRampToValueAtTime(.001,now+.35);
    n.start(now+.1); n.stop(now+.37);
  }catch(e){}
}

const FW={parts:[]};
function launchFireworks(){
  const cv=document.getElementById('fwCanvas');
  cv.width=cv.offsetWidth; cv.height=cv.offsetHeight;
  const cx=cv.getContext('2d');
  const colors=['#fde68a','#a78bfa','#34d399','#f87171','#60a5fa','#fb923c'];
  for(let b=0;b<3;b++){
    const x=cv.width*(.2+Math.random()*.6), y=cv.height*(.1+Math.random()*.4);
    for(let i=0;i<28;i++){
      const ang=Math.random()*Math.PI*2, spd=2+Math.random()*4;
      FW.parts.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:1,col:colors[Math.floor(Math.random()*colors.length)],sz:2+Math.random()*2});
    }
  }
  if(!FW.raf) fwLoop(cx,cv);
}
function fwLoop(cx,cv){
  cx.clearRect(0,0,cv.width,cv.height);
  FW.parts=FW.parts.filter(p=>{
    p.x+=p.vx; p.y+=p.vy; p.vy+=.09; p.life-=.022;
    if(p.life<=0) return false;
    cx.globalAlpha=p.life;
    cx.fillStyle=p.col;
    cx.beginPath(); cx.arc(p.x,p.y,p.sz,0,Math.PI*2); cx.fill();
    return true;
  });
  cx.globalAlpha=1;
  if(FW.parts.length>0){FW.raf=requestAnimationFrame(()=>fwLoop(cx,cv));}
  else{FW.raf=null; cx.clearRect(0,0,cv.width,cv.height);}
}

function mkBg(){
  const d=document.getElementById('bgDeco');
  ['#6d28d9','#7c3aed','#4f46e5','#0d9488','#1e40af','#7e22ce'].forEach((c,i)=>{
    const b=document.createElement('div'); b.className='bubble';
    const sz=60+Math.random()*180;
    b.style.cssText=`width:${sz}px;height:${sz}px;background:${c};top:${Math.random()*100}%;left:${Math.random()*100}%;transform:translate(-50%,-50%)`;
    d.appendChild(b);
  });
}

function pop(msg){
  const el=document.getElementById('rewardPop');
  el.textContent=msg; el.className='reward-pop fly';
  el.addEventListener('animationend',()=>el.className='reward-pop',{once:true});
}

function fmtTime(ms){
  const s=Math.floor(ms/1000), m=Math.floor(s/60);
  return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function fmtDateTime(ts){
  const d=new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function saveLB(entry){
  let lb=[];
  try{lb=JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){}
  lb.push(entry);
  lb.sort((a,b)=>b.score-a.score||a.gameMs-b.gameMs);
  lb=lb.slice(0,20);
  localStorage.setItem(LS_KEY,JSON.stringify(lb));
  return lb;
}
function getLB(){
  try{return JSON.parse(localStorage.getItem(LS_KEY)||'[]');}catch(e){return [];}
}
function clearLB(){localStorage.removeItem(LS_KEY);}

function genQ(){
  const types=S.mode==='mix'?['add','sub','mul','cmp']:[S.mode];
  const t=types[Math.floor(Math.random()*types.length)];
  let q,ans,choices;
  if(t==='add'){
    const a=Math.floor(Math.random()*50)+1;
    let b=Math.floor(Math.random()*50)+1;
    if(a+b>99) b=Math.floor(Math.random()*30)+1;
    ans=String(a+b); q=`${a} + ${b} = ?`;
  } else if(t==='sub'){
    const a=Math.floor(Math.random()*70)+20, b=Math.floor(Math.random()*(a-1))+1;
    ans=String(a-b); q=`${a} − ${b} = ?`;
  } else if(t==='mul'){
    const a=Math.floor(Math.random()*5)+2, b=Math.floor(Math.random()*9)+1;
    ans=String(a*b); q=`${a} × ${b} = ?`;
  } else {
    const a=Math.floor(Math.random()*98)+1;
    let b=Math.floor(Math.random()*98)+1;
    while(b===a) b=Math.floor(Math.random()*98)+1;
    ans=String(a>b?a:b);
    const ws=[String(a),String(b),String(a+b),String(Math.abs(a-b))];
    const uniq=[...new Set(ws)].sort(()=>Math.random()-.5).slice(0,4);
    while(uniq.length<4) uniq.push(String(Math.floor(Math.random()*99)+1));
    return{t,q:`${a}　和　${b}\n哪個比較大？`,ans,choices:uniq.slice(0,4)};
  }
  const ws=new Set();
  while(ws.size<3){const w=Number(ans)+Math.floor(Math.random()*12)-6;if(String(w)!==ans&&w>=0)ws.add(String(w));}
  choices=[ans,...ws].sort(()=>Math.random()-.5);
  return{t,q,ans,choices};
}

function render(){
  if(S.page==='home') renderHome();
  else if(S.page==='game') renderGame();
  else if(S.page==='result') renderResult();
  else renderLB();
}

function renderHome(){
  document.getElementById('view').innerHTML=`
  <div class="center-screen">
    <div style="font-size:58px;animation:bobble 2.8s ease-in-out infinite">🐰</div>
    <div class="game-title">🌟 數學大冒險 🌟</div>
    <div class="sub-title">和小兔一起闖關，收集星星！</div>
    <div style="display:flex;align-items:center;gap:10px;margin:4px 0">
      <span style="color:rgba(255,255,255,.6);font-size:13px;font-weight:700">暱稱：</span>
      <input class="nick-input" id="nickInp" placeholder="輸入你的名字" maxlength="8" value="${S.nickname}" oninput="S.nickname=this.value.trim()">
    </div>
    <div style="color:rgba(255,255,255,.6);font-size:12px;font-weight:700;margin-top:2px">選擇模式</div>
    <div class="mode-row">
      ${['add','sub','mul','cmp','mix'].map(m=>`
      <div class="mcard${S.mode===m?' picked':''}" onclick="S.mode='${m}';renderHome()">
        <div class="mcard-icon">${{add:'➕',sub:'➖',mul:'✖️',cmp:'⚖️',mix:'🎲'}[m]}</div>
        <div class="mcard-name">${MODELABEL[m]}</div>
      </div>`).join('')}
    </div>
    <div style="display:flex;gap:8px;color:rgba(255,255,255,.45);font-size:11px;font-weight:700">
      <span>❤️ 3 命</span><span>⭐ 10 題</span><span>⏱ 9 秒/題</span><span>🕐 全程計時</span>
    </div>
    <div style="display:flex;gap:9px;flex-wrap:wrap;justify-content:center">
      <button class="big-btn" onclick="startGame()">🚀 開始冒險！</button>
      <button class="big-btn ghost" onclick="S.page='lb';render()">🏆 排行榜</button>
    </div>
  </div>`;
  setTimeout(()=>{const n=document.getElementById('nickInp');if(n)n.addEventListener('input',e=>S.nickname=e.target.value.trim());},0);
}

function startGame(){
  if(!S.nickname){alert('請先輸入你的暱稱喔！');return;}
  Object.assign(S,{score:0,streak:0,lives:3,qi:0,locked:false,gameMs:0});
  S.page='game'; S.face='🐰'; S.speech='加油！';
  if(S.gameTick)clearInterval(S.gameTick);
  S.gameTick=setInterval(()=>{S.gameMs+=100;updateGameTimer();},100);
  nextQ();
}

function updateGameTimer(){
  const el=document.getElementById('gameTimer');
  if(el) el.textContent=fmtTime(S.gameMs);
}

function nextQ(){
  if(S.qi>=S.total){endGame();return;}
  CQ=genQ(); S.locked=false;
  renderGame();
  startTimer();
}

function startTimer(){
  if(S.timerTick)clearInterval(S.timerTick);
  S.timerLeft=S.timerMs;
  S.timerTick=setInterval(()=>{
    S.timerLeft-=80;
    const pct=Math.max(0,S.timerLeft/S.timerMs*100);
    const bar=document.getElementById('tBar');
    if(bar){bar.style.width=pct+'%';bar.style.background=pct>55?'#a78bfa':pct>28?'#fbbf24':'#f87171';}
    if(S.timerLeft<=0){clearInterval(S.timerTick);onTimeout();}
  },80);
}

function onTimeout(){
  if(S.locked)return; S.locked=true;
  S.streak=0; S.lives--;
  S.face='😢'; S.speech='時間到了！沒關係～';
  playWrong();
  hiliteCorrect();
  updateHUD();
  if(S.lives<=0){setTimeout(()=>endGame(),1300);}
  else setTimeout(()=>{S.qi++;nextQ();},1300);
}

function answer(btn,val){
  if(S.locked)return; S.locked=true;
  if(S.timerTick)clearInterval(S.timerTick);
  const ok=val===CQ.ans;
  btn.classList.add(ok?'correct':'wrong');
  document.querySelectorAll('.ans-btn').forEach(b=>b.disabled=true);
  if(ok){
    const bonus=S.streak>=2?S.streak*2:0;
    S.score+=10+bonus; S.streak++;
    S.face='🥳'; S.speech=S.streak>=3?`🔥 ${S.streak}連擊！`:'答對了！真棒！';
    playCorrect(); launchFireworks();
    pop(S.streak>=3?`🔥 ${S.streak}連擊 +${10+bonus}分`:'✅ +10分');
  } else {
    S.streak=0; S.lives--;
    S.face='😢'; S.speech='答錯了，下次加油！';
    playWrong(); hiliteCorrect();
  }
  updateHUD();
  if(S.lives<=0){setTimeout(()=>endGame(),1300);}
  else setTimeout(()=>{S.qi++;nextQ();},1200);
}

function hiliteCorrect(){
  document.querySelectorAll('.ans-btn').forEach(b=>{
    if(b.dataset.val===CQ.ans)b.classList.add('correct');
    b.disabled=true;
  });
}

function updateHUD(){
  const els={hudLives:'lives',hudScore:'score',hudStreak:'streak'};
  for(const [id,k] of Object.entries(els)){const e=document.getElementById(id);if(e)e.textContent=S[k];}
  const sp=document.getElementById('speech'); if(sp)sp.textContent=S.speech;
  const mc=document.getElementById('mascotFace'); if(mc)mc.textContent=S.face;
  const pf=document.getElementById('progFill');if(pf)pf.style.width=Math.round(S.qi/S.total*100)+'%';
}

function renderGame(){
  const modeLabel=MODELABEL[CQ.t]||'';
  const pct=Math.round(S.qi/S.total*100);
  document.getElementById('view').innerHTML=`
  <div class="hud" style="max-width:500px">
    <div class="chip">❤️ <span class="val" id="hudLives">${S.lives}</span></div>
    <div class="chip">⭐ <span class="val" id="hudScore">${S.score}</span></div>
    <div class="chip timer-chip">🕐 <span class="val" id="gameTimer">${fmtTime(S.gameMs)}</span></div>
    <div class="chip">🔥 <span class="val" id="hudStreak">${S.streak}</span></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-track"><div class="prog-fill" id="progFill" style="width:${pct}%"></div></div>
    <div class="prog-label">第 ${S.qi+1} / ${S.total} 題</div>
  </div>
  <div class="mascot-wrap">
    <div class="mascot-face" id="mascotFace">${S.face}</div>
    <div class="bubble-speech" id="speech">${S.speech}</div>
  </div>
  <div class="qcard">
    <div class="mode-tag">${modeLabel}</div>
    <div class="question-text">${CQ.q}</div>
    <div class="timer-track"><div class="timer-bar" id="tBar" style="width:100%;background:#a78bfa"></div></div>
  </div>
  <div class="ans-grid">
    ${CQ.choices.map(c=>`<button class="ans-btn" data-val="${c}" onclick="answer(this,'${c}')">${c}</button>`).join('')}
  </div>`;
}

function endGame(){
  if(S.timerTick)clearInterval(S.timerTick);
  if(S.gameTick)clearInterval(S.gameTick);
  if(S.timerTick)clearInterval(S.timerTick);
  const entry={name:S.nickname,score:S.score,gameMs:S.gameMs,mode:S.mode,ts:Date.now()};
  saveLB(entry);
  S.page='result'; render();
}

function renderResult(){
  const pct=Math.round(S.score/(S.total*10)*100);
  const emo=S.lives<=0?'💔':pct>=80?'🏆':pct>=60?'🌟':'🐰';
  const msg=S.lives<=0?'再試一次，你一定可以！':pct>=80?'太厲害了！數學小天才！':pct>=60?'做得很好！繼續加油！':'多練習，你會越來越棒！';
  const stars=pct>=80?3:pct>=60?2:1;
  const starsHtml=[0,1,2].map(i=>`<span class="s-icon${i<stars?' lit':''}">⭐</span>`).join('');
  document.getElementById('view').innerHTML=`
  <div class="center-screen">
    <div style="font-size:62px;animation:bobble 2.8s ease-in-out infinite">${emo}</div>
    <div class="stars-row">${starsHtml}</div>
    <div class="result-score">${S.score} 分</div>
    <div class="result-msg">${msg}</div>
    <div class="stat-row">
      <div class="stat-chip"><span class="n">${Math.round(S.score/10)}</span>答對</div>
      <div class="stat-chip"><span class="n">${fmtTime(S.gameMs)}</span>用時</div>
      <div class="stat-chip"><span class="n">${S.lives>0?S.lives:0}</span>剩餘命</div>
    </div>
    <div style="display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:6px">
      <button class="big-btn" onclick="startGame()">🔄 再玩一次</button>
      <button class="big-btn ghost" onclick="S.page='lb';render()">🏆 排行榜</button>
      <button class="big-btn ghost" onclick="S.page='home';render()">🏠 主選單</button>
    </div>
  </div>`;
}

function renderLB(){
  const lb=getLB();
  const rankIcon=i=>i===0?'🥇':i===1?'🥈':i===2?'🥉':`${i+1}`;
  document.getElementById('view').innerHTML=`
  <div style="width:100%;max-width:500px;margin-top:8px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div style="color:#fde68a;font-size:20px;font-weight:900">🏆 排行榜</div>
      <div style="display:flex;gap:8px">
        <button class="big-btn ghost" style="font-size:12px;padding:6px 14px" onclick="if(confirm('確定清除所有紀錄？')){clearLB();renderLB()}">清除</button>
        <button class="big-btn ghost" style="font-size:12px;padding:6px 14px" onclick="S.page='home';render()">← 回主選單</button>
      </div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:10px;font-size:11px;font-weight:700;color:rgba(255,255,255,.4);padding:0 14px">
      <span style="width:28px">名次</span>
      <span style="flex:1">暱稱</span>
      <span style="min-width:52px;text-align:right">分數</span>
      <span style="min-width:52px;text-align:right">用時</span>
      <span style="min-width:44px;text-align:right">模式</span>
      <span style="min-width:100px;text-align:right">日期時間</span>
    </div>
    <div class="lb-wrap">
      ${lb.length===0?`<div style="color:rgba(255,255,255,.4);text-align:center;padding:32px;font-size:14px">還沒有紀錄，快去闖關！</div>`
      :lb.map((e,i)=>`
      <div class="lb-row">
        <div class="lb-rank">${rankIcon(i)}</div>
        <div class="lb-name">${e.name||'無名'}</div>
        <div class="lb-score">${e.score}分</div>
        <div class="lb-time">${fmtTime(e.gameMs)}</div>
        <div class="lb-mode">${MODELABEL[e.mode]||e.mode}</div>
        <div class="lb-date">${fmtDateTime(e.ts)}</div>
      </div>`).join('')}
    </div>
    <div style="color:rgba(255,255,255,.3);font-size:11px;text-align:center;margin-top:10px;font-weight:700">排序：分數高者優先，同分以用時短者優先</div>
  </div>`;
}

mkBg();
render();
</script>
